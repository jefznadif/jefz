<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ChatSphere - Verifikasi PIN</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #075e54, #128C7E);
        }
        .pin-container {
            background: white;
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .pin-container h1 {
            color: #075e54;
            margin-bottom: 1rem;
        }
        .pin-input-group {
            margin: 1.5rem 0;
        }
        #pinInput {
            width: 100%;
            padding: 1rem;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 8px;
            border: 2px solid #ddd;
            border-radius: 1rem;
            outline: none;
            font-family: monospace;
        }
        #pinInput:focus {
            border-color: #25D366;
        }
        button {
            background: #128C7E;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:hover {
            background: #075e54;
        }
        .error-msg {
            color: #e74c3c;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .info {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="pin-container">
        <h1>🔐 ChatSphere</h1>
        <p>Masukkan PIN untuk mengakses dashboard</p>
        <div class="pin-input-group">
            <input type="password" id="pinInput" maxlength="6" placeholder="******" inputmode="numeric">
        </div>
        <button id="verifyBtn">Verifikasi & Masuk</button>
        <div class="error-msg" id="errorMsg">PIN salah! Silakan coba lagi.</div>
        <div class="info">PIN disimpan aman di Supabase</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        // Inisialisasi halaman PIN
        document.addEventListener('DOMContentLoaded', () => {
            const pinInput = document.getElementById('pinInput');
            const verifyBtn = document.getElementById('verifyBtn');
            const errorMsg = document.getElementById('errorMsg');

            async function verifyPin() {
                const pin = pinInput.value.trim();
                if (!pin) {
                    errorMsg.textContent = 'PIN tidak boleh kosong!';
                    errorMsg.style.display = 'block';
                    return;
                }

                const isValid = await window.verifyPin(pin);
                if (isValid) {
                    // Simpan status login di sessionStorage
                    sessionStorage.setItem('isAuthenticated', 'true');
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.style.display = 'block';
                    pinInput.value = '';
                    pinInput.focus();
                }
            }

            verifyBtn.addEventListener('click', verifyPin);
            pinInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') verifyPin();
            });
        });
    </script>
</body>
</html>
