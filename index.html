<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jefz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div id="loginPage" class="page active">
  <div class="login-bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>
  <div class="login-wrap">
    <div class="login-logo">✦</div>
    <h1 class="login-title">Jefz</h1>
    <p class="login-sub">Pilih akun untuk masuk</p>

    <!-- Step 1: Pilih akun -->
    <div id="stepAccount">
      <div class="account-list">
        <button class="account-card" onclick="selectAccount('Ndifaa','user')">
          <div class="acc-avatar ndifaa">N</div>
          <div class="acc-info">
            <span class="acc-name">Ndifaa</span>
            <span class="acc-role">User</span>
          </div>
          <span class="acc-arrow">›</span>
        </button>
        <button class="account-card" onclick="selectAccount('Jef\'z','admin')">
          <div class="acc-avatar jefz">J</div>
          <div class="acc-info">
            <span class="acc-name">Jef'z</span>
            <span class="acc-role">Admin</span>
          </div>
          <span class="acc-arrow">›</span>
        </button>
      </div>
    </div>

    <!-- Step 2: Input PIN -->
    <div id="stepPin" style="display:none">
      <div class="back-row">
        <button class="back-btn" onclick="backToAccount()">← Kembali</button>
      </div>
      <div class="selected-acc-info" id="selectedAccInfo"></div>
      <div class="pin-field-wrap">
        <input
          type="password"
          id="pinInput"
          class="pin-input"
          placeholder="Masukkan PIN"
          autocomplete="off"
        />
        <button class="pin-submit" onclick="doLogin()">→</button>
      </div>
      <div id="loginErr" class="login-err"></div>
    </div>

  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashPage" class="page">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-avatar" id="topbarAvatar"></div>
      <div>
        <div class="topbar-title" id="topbarTitle">Catatan</div>
        <div class="topbar-user" id="topbarUser"></div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="tb-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <button class="tb-btn logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- NOTES TAB -->
  <div id="tabNotes" class="tab active-tab">
    <div id="notesList" class="notes-list"></div>
    <div class="note-form glass-panel">
      <input type="text" id="noteTitle" class="field" placeholder="Judul catatan"/>
      <textarea id="noteBody" class="field field-ta" rows="3" placeholder="Isi catatan..."></textarea>
      <button class="btn-act" onclick="addNote()">+ Tambah</button>
    </div>
  </div>

  <!-- CHAT TAB -->
  <div id="tabChat" class="tab">
    <div id="chatList" class="chat-list"></div>
    <div class="chat-bar">
      <input type="text" id="chatInput" class="field chat-field" placeholder="Pesan..." onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="btn-send" onclick="sendMsg()">↑</button>
    </div>
  </div>

  <!-- GALLERY TAB -->
  <div id="tabGallery" class="tab">
    <div class="gallery-header">
      <label class="btn-upload" id="uploadLabel">
        + Upload
        <input type="file" id="fileUpload" accept="image/*,video/*" style="display:none" onchange="doUpload(this)"/>
      </label>
    </div>
    <div id="galleryGrid" class="gallery-grid"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="goTab('Notes','Catatan',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>Catatan</span>
    </button>
    <button class="nav-item" onclick="goTab('Chat','ChatRoom',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span>Chat</span>
    </button>
    <button class="nav-item" onclick="goTab('Gallery','Gallery',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span>Gallery</span>
    </button>
  </nav>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt=""/>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
