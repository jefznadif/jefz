<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ChatSphere - Ruang Obrolan Instan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        /* Container utama chat */
        .chat-container {
            max-width: 1100px;
            width: 100%;
            height: 90vh;
            background: #f8fafc;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(2px);
            transition: all 0.2s ease;
        }

        /* Header premium */
        .chat-header {
            background: linear-gradient(135deg, #075e54, #128C7E);
            padding: 1rem 1.8rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .avatar {
            background: #25D366;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .header-info h2 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .header-info p {
            font-size: 0.75rem;
            opacity: 0.85;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #25D366;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        /* Area pesan (scroll otomatis) */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            background: #e5ded8;
            background-image: radial-gradient(circle at 10% 30%, rgba(210, 190, 170, 0.1) 2%, transparent 2.5%);
            background-size: 28px 28px;
        }

        /* bubble style */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeSlideUp 0.2s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.7rem 1rem;
            border-radius: 1.8rem;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.05);
        }

        .sent .bubble {
            background: #dcf8c5;
            border-bottom-right-radius: 0.4rem;
            color: #111;
        }

        .received .bubble {
            background: white;
            border-bottom-left-radius: 0.4rem;
            color: #1e2a32;
        }

        .message-info {
            font-size: 0.65rem;
            margin-top: 4px;
            margin-left: 10px;
            margin-right: 10px;
            color: #6c757d;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .sent .message-info {
            justify-content: flex-end;
        }

        .timestamp {
            font-family: monospace;
        }

        /* Tampilan saat tidak ada pesan */
        .empty-chat {
            text-align: center;
            margin-top: 3rem;
            color: #8e7a6b;
            font-weight: 500;
            opacity: 0.7;
        }

        /* Input area modern */
        .input-area {
            background: #ffffff;
            padding: 0.9rem 1.2rem;
            display: flex;
            gap: 0.8rem;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            backdrop-filter: blur(4px);
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            background: #f1f3f5;
            border-radius: 2rem;
            padding: 0.2rem 0.8rem;
            align-items: center;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .input-wrapper:focus-within {
            background: white;
            border-color: #25D366;
            box-shadow: 0 0 0 2px rgba(37,211,102,0.2);
        }

        #messageInput {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.8rem 0.3rem;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }

        #messageInput::placeholder {
            color: #9aa6b5;
            font-weight: 400;
        }

        .emoji-btn, .attach-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.4rem;
            color: #5e6f8d;
            transition: 0.1s;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .emoji-btn:hover, .attach-btn:hover {
            background: #e9ecef;
            transform: scale(1.03);
        }

        #sendBtn {
            background: #128C7E;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
            color: white;
            font-size: 1.3rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        #sendBtn:hover {
            background: #075e54;
            transform: scale(1.02);
        }

        /* Scrollbar kustom */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #ddd0c2;
            border-radius: 8px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #a28c78;
            border-radius: 8px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .chat-container {
                height: 95vh;
                border-radius: 1.2rem;
            }
            .message {
                max-width: 85%;
            }
            .bubble {
                font-size: 0.85rem;
            }
            .header-info h2 {
                font-size: 1.1rem;
            }
        }

        /* status typing (simulasi) */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            background: white;
            padding: 0.4rem 1rem;
            border-radius: 1.5rem;
            width: fit-content;
            font-size: 0.75rem;
            color: #4b6a5c;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            margin-bottom: 0.5rem;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #25D366;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.2s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0);}
            30% { opacity: 1; transform: translateY(-2px);}
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">💬</div>
        <div class="header-info">
            <h2>ChatSphere</h2>
            <p><span class="online-dot"></span> Online · Real-time chat</p>
        </div>
    </div>

    <div class="messages-area" id="messagesArea">
        <div class="empty-chat" id="emptyChatPlaceholder">
            ✨ Tidak ada pesan. Mulai obrolan! ✨
        </div>
    </div>

    <div class="input-area">
        <button class="emoji-btn" id="emojiBtn" title="Tambahkan emoji">😊</button>
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Ketik pesan ..." autocomplete="off">
        </div>
        <button id="sendBtn">➤</button>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // 1. Data & State
    // --------------------------------------------------------------
    let messages = [];               // array of { text, type, timestamp }
    let mockInterval = null;        // untuk simulasi auto-reply
    let isTypingSimulated = false;   // cegah spam typing
    
    // Elemen DOM
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const emptyPlaceholder = document.getElementById('emptyChatPlaceholder');
    
    // Helper: format waktu (HH:MM)
    function getCurrentTime() {
        const now = new Date();
        return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    // Helper: render ulang semua pesan ke dalam messagesArea
    function renderMessages() {
        // Hapus semua child kecuali placeholder (nanti di adjust)
        // Tapi lebih rapi: kosongkan area lalu render ulang
        const allChildren = Array.from(messagesArea.children);
        // Hapus semua node biasa, namun menyisakan placeholder? kita akan handle dengan conditional.
        // Lebih baik bersihkan semuanya dan masukkan lagi pesan, lalu tentukan visibility placeholder
        while (messagesArea.firstChild) {
            messagesArea.removeChild(messagesArea.firstChild);
        }
        
        if (messages.length === 0) {
            // tampilkan placeholder
            emptyPlaceholder.style.display = 'block';
            messagesArea.appendChild(emptyPlaceholder);
            return;
        } else {
            emptyPlaceholder.style.display = 'none';
        }
        
        // Loop setiap pesan & buat elemen
        for (let i = 0; i < messages.length; i++) {
            const msg = messages[i];
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${msg.type}`;  // 'sent' atau 'received'
            
            // bubble
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = msg.text;
            
            // info waktu
            const infoDiv = document.createElement('div');
            infoDiv.className = 'message-info';
            const timeSpan = document.createElement('span');
            timeSpan.className = 'timestamp';
            timeSpan.textContent = msg.timestamp || getCurrentTime();
            // optional status (centang untuk sent)
            if (msg.type === 'sent') {
                const statusSpan = document.createElement('span');
                statusSpan.innerHTML = '✓✓';
                statusSpan.style.fontSize = '0.7rem';
                statusSpan.style.opacity = '0.7';
                infoDiv.appendChild(statusSpan);
            } else {
                const avatarMini = document.createElement('span');
                avatarMini.innerHTML = '👤';
                avatarMini.style.fontSize = '0.7rem';
                infoDiv.appendChild(avatarMini);
            }
            infoDiv.appendChild(timeSpan);
            
            messageDiv.appendChild(bubble);
            messageDiv.appendChild(infoDiv);
            messagesArea.appendChild(messageDiv);
        }
        
        // Scroll ke bawah otomatis
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    // Fungsi menambahkan pesan baru (dari user atau sistem/bot)
    function addMessage(text, type) {
        if (!text.trim()) return false;
        const newMsg = {
            text: text.trim(),
            type: type,     // "sent" atau "received"
            timestamp: getCurrentTime()
        };
        messages.push(newMsg);
        renderMessages();
        return true;
    }
    
    // Simulasi balasan otomatis dari partner (fitur bot sederhana)
    function simulateAutoReply(userMessage) {
        // Hapus interval jika sudah ada sebelumnya agar tidak double reply
        if (mockInterval) clearTimeout(mockInterval);
        
        // Tampilkan indikator "sedang mengetik..." sebelum balasan
        showTypingIndicator();
        
        // Set timeout untuk membalas (delay natural antara 800 - 1800 ms)
        mockInterval = setTimeout(() => {
            // Hilangkan indikator typing apapun yang ada
            removeTypingIndicator();
            
            // Pilih balasan cerdas berdasarkan kata kunci, atau random friendly
            let replyText = "";
            const lowerMsg = userMessage.toLowerCase();
            if (lowerMsg.includes("hai") || lowerMsg.includes("halo") || lowerMsg.includes("hello")) {
                replyText = "Halo juga! Senang ngobrol denganmu 😄";
            } else if (lowerMsg.includes("apa kabar") || lowerMsg.includes("kabar")) {
                replyText = "Baik banget! Kamu sendiri gimana? 🎉";
            } else if (lowerMsg.includes("terima kasih") || lowerMsg.includes("makasih") || lowerMsg.includes("thanks")) {
                replyText = "Sama-sama! Senang bisa bantu 💙";
            } else if (lowerMsg.includes("cuaca") || lowerMsg.includes("hujan")) {
                replyText = "Cuaca di sini cerah! Tapi kadang mendung. Kamu di sana gimana? ☁️";
            } else if (lowerMsg.includes("help") || lowerMsg.includes("tolong")) {
                replyText = "Ada yang bisa saya bantu? fitur chat ini full realtime loh! 🤝";
            } else if (lowerMsg.includes("bot") || lowerMsg.includes("kamu siapa")) {
                replyText = "Aku asisten virtual di ChatSphere, tapi kamu bisa chat juga sama temanmu! 😎";
            } else if (Math.random() > 0.6) {
                const funnyReplies = ["Wah menarik! Ceritain lebih lanjut dong ✨", "Haha iya dong, lanjut yuk!", "Setuju banget! 😁", "Keren banget tuh, salut!", "Pasti seru ya! Lanjut chat terus!"];
                replyText = funnyReplies[Math.floor(Math.random() * funnyReplies.length)];
            } else {
                replyText = "Menarik! Aku suka pembahasan ini. Ada lagi yang ingin kamu diskusikan? 💬";
            }
            
            addMessage(replyText, "received");
            
            // Simulasi tambahan bila tidak ada aktifitas typing lagi
            mockInterval = null;
        }, 1200 + Math.random() * 1000);
    }
    
    // Fungsi untuk menampilkan indikator "Sedang mengetik..." (tanpa merusak pesan)
    let typingElement = null;
    function showTypingIndicator() {
        removeTypingIndicator(); // singkirkan yang lama biar ga dobel
        typingElement = document.createElement('div');
        typingElement.className = 'typing-indicator';
        typingElement.id = 'dynamicTyping';
        typingElement.innerHTML = `
            <span>Partner mengetik</span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
        `;
        // Tempatkan di atas area pesan sebelum pesan terakhir? Letakkan di messagesArea di paling bawah supaya natural
        // Tapi harus di akhir sebelum pesan berikutnya. cara: append sementara sebelum scroll
        messagesArea.appendChild(typingElement);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    function removeTypingIndicator() {
        if (typingElement && typingElement.parentNode) {
            typingElement.parentNode.removeChild(typingElement);
            typingElement = null;
        }
        // cek juga berdasarkan id jaga2
        const existing = document.getElementById('dynamicTyping');
        if(existing) existing.remove();
    }
    
    // Fungsi untuk mengirim pesan dari user
    function sendMessage() {
        const rawText = messageInput.value;
        if (!rawText.trim()) return;
        
        // Tambahkan pesan user (sent)
        addMessage(rawText, "sent");
        
        // Kosongkan input
        messageInput.value = "";
        messageInput.focus();
        
        // Hapus typing indicator sebelumnya jika ada dari partner tidak sengaja
        removeTypingIndicator();
        
        // Simulasi balasan otomatis (seperti partner chat)
        // Bersihkan timeout lama jika masih jalan, agar reply tidak double
        if (mockInterval) {
            clearTimeout(mockInterval);
            mockInterval = null;
        }
        // Jalankan balasan dengan delay natural
        simulateAutoReply(rawText);
    }
    
    // Event listener untuk mengirim
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    // Fitur tambahan: Emoji picker sederhana (tanpa library eksternal, cukup menambahkan emoji ke input)
    const emojiBtn = document.getElementById('emojiBtn');
    // Daftar emoji populer
    const commonEmojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😢', '😡', '👋', '🤔', '✨', '💯', '🥳', '😎', '🐱', '🍕'];
    let emojiPanel = null;
    
    function createEmojiPanel() {
        if (emojiPanel) return emojiPanel;
        const panel = document.createElement('div');
        panel.style.position = 'absolute';
        panel.style.bottom = '75px';
        panel.style.left = '20px';
        panel.style.backgroundColor = '#fff';
        panel.style.borderRadius = '20px';
        panel.style.boxShadow = '0 10px 25px -5px rgba(0,0,0,0.2)';
        panel.style.padding = '10px';
        panel.style.display = 'flex';
        panel.style.flexWrap = 'wrap';
        panel.style.gap = '8px';
        panel.style.width = '220px';
        panel.style.zIndex = '100';
        panel.style.border = '1px solid #e2e8f0';
        commonEmojis.forEach(emoji => {
            const emojiSpan = document.createElement('span');
            emojiSpan.textContent = emoji;
            emojiSpan.style.fontSize = '1.6rem';
            emojiSpan.style.cursor = 'pointer';
            emojiSpan.style.padding = '4px 8px';
            emojiSpan.style.borderRadius = '12px';
            emojiSpan.style.transition = '0.1s';
            emojiSpan.onmouseover = () => emojiSpan.style.backgroundColor = '#f1f5f9';
            emojiSpan.onmouseout = () => emojiSpan.style.backgroundColor = 'transparent';
            emojiSpan.onclick = () => {
                messageInput.value += emoji;
                messageInput.focus();
                panel.remove();
                emojiPanel = null;
            };
            panel.appendChild(emojiSpan);
        });
        // tombol close sederhana
        const closeBtn = document.createElement('div');
        closeBtn.textContent = '✖ tutup';
        closeBtn.style.fontSize = '0.7rem';
        closeBtn.style.cursor = 'pointer';
        closeBtn.style.marginTop = '6px';
        closeBtn.style.textAlign = 'center';
        closeBtn.style.width = '100%';
        closeBtn.style.color = '#6c757d';
        closeBtn.onclick = () => {
            if(emojiPanel) emojiPanel.remove();
            emojiPanel = null;
        };
        panel.appendChild(closeBtn);
        return panel;
    }
    
    emojiBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (emojiPanel) {
            emojiPanel.remove();
            emojiPanel = null;
            return;
        }
        const panel = createEmojiPanel();
        document.body.appendChild(panel);
        // posisi relatif terhadap tombol
        const rect = emojiBtn.getBoundingClientRect();
        panel.style.position = 'fixed';
        panel.style.bottom = (window.innerHeight - rect.top + 10) + 'px';
        panel.style.left = rect.left + 'px';
        emojiPanel = panel;
        
        // Klik di luar untuk menutup
        const closePanelHandler = (ev) => {
            if (!panel.contains(ev.target) && ev.target !== emojiBtn) {
                if(emojiPanel) emojiPanel.remove();
                emojiPanel = null;
                document.removeEventListener('click', closePanelHandler);
            }
        };
        setTimeout(() => document.addEventListener('click', closePanelHandler), 10);
    });
    
    // Fitur tambahan: tombol attach (simulasi, tidak implement file, hanya untuk estetika / alert demo)
    const attachBtn = document.querySelector('.attach-btn');
    if (attachBtn) {
        attachBtn.addEventListener('click', () => {
            alert('📎 Fitur upload file akan hadir di versi pro! Saat ini kamu tetap bisa kirim teks dan emoji.');
        });
    }
    
    // Inisialisasi pertama dengan pesan sambutan (optional tapi lebih hidup)
    function initWelcomeMessage() {
        if (messages.length === 0) {
            setTimeout(() => {
                addMessage("Halo! Selamat datang di ChatSphere ✨ Kirim pesan, saya akan membalas otomatis seperti teman ngobrol!", "received");
            }, 400);
        }
    }
    
    // Fokus awal dan sambutan
    messageInput.focus();
    initWelcomeMessage();
    
    // Tambahan: Jika user ingin reset / clear? tidak ada tombol, tapi bisa state bersih.
    // (optional double typing safety)
    // Pastikan ketika komponen di-unload cleanup interval
    window.addEventListener('beforeunload', () => {
        if (mockInterval) clearTimeout(mockInterval);
        if (typingElement) removeTypingIndicator();
    });
    
    // Efek jika user selesai mengetik? Tidak perlu intervensi tambahan
    // Simulasi menarik: untuk lebih interaktif, kita bisa membuat partner mengetik jika user idle? tidak diperlukan.
</script>
</body>
</html>
