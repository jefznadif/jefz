<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatSphere - Login PIN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pin-container">
        <div class="pin-card">
            <div class="pin-icon">🔐</div>
            <h1>ChatSphere</h1>
            <p>Masukkan PIN untuk mengakses dashboard</p>
            
            <div class="pin-input-group">
                <input type="password" id="pinInput" maxlength="6" placeholder="******" inputmode="numeric" autofocus>
            </div>
            
            <button id="verifyBtn" class="btn-primary">Verifikasi & Masuk</button>
            
            <div id="errorMsg" class="error-msg"></div>
            <div class="info-text">PIN default: <strong>123456</strong></div>
            <div id="statusMsg" class="status-msg"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
