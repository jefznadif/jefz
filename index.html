<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatSphere - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pin-container">
        <div class="pin-card">
            <div class="pin-icon">🔐</div>
            <h1>ChatSphere</h1>
            <p>Masukkan PIN untuk masuk</p>
            
            <div class="pin-input-group">
                <input type="password" id="pinInput" maxlength="6" placeholder="******" autofocus>
            </div>
            
            <button id="verifyBtn" class="btn-primary">Verifikasi & Masuk</button>
            
            <div id="messageBox" class="message-box"></div>
            <div class="info-text">PIN: <strong>123456</strong></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
