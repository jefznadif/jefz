<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatSphere - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <div class="dashboard-header">
            <h2>💬 ChatSphere</h2>
            <button id="logoutBtn" class="btn-logout">🚪 Logout</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="notes">📝 Catatan</button>
            <button class="tab-btn" data-tab="chat">💬 ChatRoom</button>
            <button class="tab-btn" data-tab="gallery">🖼️ Gallery</button>
        </div>

        <!-- Tab Notes -->
        <div id="notes" class="tab-content active">
            <div class="section-title">📝 Catatan Saya</div>
            <div id="notesList" class="notes-list">
                <div class="empty-state">Belum ada catatan</div>
            </div>
            <div class="add-section">
                <input type="text" id="noteTitle" placeholder="Judul catatan">
                <textarea id="noteContent" rows="2" placeholder="Isi catatan..."></textarea>
                <button id="addNoteBtn" class="btn-success">+ Tambah</button>
            </div>
        </div>

        <!-- Tab Chat -->
        <div id="chat" class="tab-content">
            <div class="section-title">💬 Ruang Chat</div>
            <div id="messagesArea" class="messages-area">
                <div class="empty-state">Belum ada pesan</div>
            </div>
            <div class="input-group">
                <input type="text" id="chatInput" placeholder="Ketik pesan...">
                <button id="sendChatBtn" class="btn-primary">Kirim</button>
            </div>
        </div>

        <!-- Tab Gallery -->
        <div id="gallery" class="tab-content">
            <div class="section-title">🖼️ Gallery</div>
            <div id="galleryGrid" class="gallery-grid">
                <div class="empty-state">Belum ada gambar</div>
            </div>
            <div class="add-section">
                <input type="text" id="imageUrl" placeholder="URL gambar">
                <button id="addImageBtn" class="btn-success">+ Tambah</button>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
