<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatSphere - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <div class="dashboard-header">
            <div class="logo">
                <span>💬</span>
                <h2>ChatSphere</h2>
            </div>
            <button id="logoutBtn" class="btn-logout">🚪 Logout</button>
        </div>

        <!-- Tabs Navigation -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="notes">📝 Catatan</button>
            <button class="tab-btn" data-tab="chat">💬 ChatRoom</button>
            <button class="tab-btn" data-tab="gallery">🖼️ Gallery</button>
        </div>

        <!-- Tab Content: Notes -->
        <div id="notes" class="tab-content active">
            <div class="content-header">
                <h3>📝 Catatan Saya</h3>
            </div>
            <div id="notesList" class="notes-list">
                <div class="loading-spinner">Loading...</div>
            </div>
            <div class="add-note">
                <h4>Tambah Catatan Baru</h4>
                <input type="text" id="noteTitle" placeholder="Judul catatan">
                <textarea id="noteContent" rows="3" placeholder="Isi catatan..."></textarea>
                <button id="addNoteBtn" class="btn-success">+ Tambah Catatan</button>
            </div>
        </div>

        <!-- Tab Content: Chat Room -->
        <div id="chat" class="tab-content">
            <div class="content-header">
                <h3>💬 Ruang Chat Publik</h3>
                <span id="chatStatus" class="online-status">🟢 Online</span>
            </div>
            <div class="chat-room">
                <div id="messagesArea" class="messages-area">
                    <div class="loading-spinner">Memuat pesan...</div>
                </div>
                <div class="message-input-area">
                    <input type="text" id="chatInput" placeholder="Ketik pesan..." autocomplete="off">
                    <button id="sendChatBtn" class="btn-send">📤 Kirim</button>
                </div>
            </div>
        </div>

        <!-- Tab Content: Gallery -->
        <div id="gallery" class="tab-content">
            <div class="content-header">
                <h3>🖼️ Gallery Gambar</h3>
            </div>
            <div id="galleryGrid" class="gallery-grid">
                <div class="loading-spinner">Loading gambar...</div>
            </div>
            <div class="add-gallery">
                <h4>Tambah Gambar Baru</h4>
                <div class="gallery-input-group">
                    <input type="text" id="imageUrl" placeholder="Masukkan URL gambar (https://...)">
                    <button id="addImageBtn" class="btn-primary">+ Tambah ke Gallery</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="dashboard.js"></script>
</body>
</html>
